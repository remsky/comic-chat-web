<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Live comic chat rooms rendered by the open-source Microsoft Comic Chat engine port."
		/>
		<title>Comic Chat Rooms</title>
		<link rel="stylesheet" href="/src/browser/gallery.css" />
		<link rel="stylesheet" href="/src/browser/room.css" />
	</head>
	<body>
		<header class="masthead masthead-room">
			<p class="eyebrow"><a href="/">Comic Chat Web</a></p>
			<h1>Chat as a comic</h1>
			<p class="intro">
				Every message becomes a panel, composed live in your browser. Everyone
				in the room sees the same comic.
			</p>
		</header>
		<section id="join" class="join-card" aria-label="Join a room">
			<form id="join-form">
				<label>
					Room
					<input
						id="join-room"
						name="room"
						required
						pattern="[\w\-]{1,64}"
						placeholder="lobby"
						autocomplete="off"
					/>
				</label>
				<label>
					Name
					<input
						id="join-name"
						name="name"
						required
						maxlength="24"
						placeholder="Your name"
						autocomplete="nickname"
					/>
				</label>
				<label>
					Character
					<select id="join-avatar" name="avatar"></select>
				</label>
				<button type="submit">Join room</button>
			</form>
		</section>
		<main id="room" class="room" hidden>
			<p id="roster" class="roster" role="status"></p>
			<div id="panels" class="gallery room-panels" aria-live="polite"></div>
			<form id="composer" class="composer">
				<select id="composer-mode" aria-label="Balloon type">
					<option value="1">Say</option>
					<option value="2">Whisper</option>
					<option value="3">Think</option>
					<option value="5">Action</option>
				</select>
				<input
					id="composer-text"
					maxlength="1000"
					required
					placeholder="Say something..."
					autocomplete="off"
					aria-label="Message"
				/>
				<button type="submit">Send</button>
			</form>
		</main>
		<p id="status" class="status" role="status">Loading fonts and avatar art…</p>
		<script type="module" src="/src/browser/room.ts"></script>
	</body>
</html>
