name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser

      - name: Verify tag matches package.json
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match package.json version $pkg; bump package.json before tagging" >&2
            exit 1
          fi

      - name: Generate notes from commit log
        run: |
          prev=$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)
          range=${prev:+$prev..}$GITHUB_REF_NAME
          log=$(git log "$range" --no-merges --pretty=format:'- %s (%h)')
          feats=$(printf '%s\n' "$log" | grep -E '^- feat' || true)
          fixes=$(printf '%s\n' "$log" | grep -E '^- fix' || true)
          other=$(printf '%s\n' "$log" | grep -Ev '^- (feat|fix)' || true)
          : > notes.md
          if [ -n "$feats" ]; then printf '## Features\n%s\n\n' "$feats" >> notes.md; fi
          if [ -n "$fixes" ]; then printf '## Fixes\n%s\n\n' "$fixes" >> notes.md; fi
          if [ -n "$other" ]; then printf '## Maintenance\n%s\n\n' "$other" >> notes.md; fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md
