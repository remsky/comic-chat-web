<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Live comic chat rooms rendered by the open-source Microsoft Comic Chat engine port."
		/>
		<title>Comic Chat Web</title>
		<link rel="stylesheet" href="/src/browser/room.css" />
	</head>
	<body class="app">
		<header class="titlebar">
			<span class="titlebar-text">Comic Chat Web</span>
			<span id="title-room" class="titlebar-room"></span>
		</header>
		<main id="room" class="workspace">
			<section id="strip" class="strip" aria-label="Comic strip">
				<div id="panels" class="strip-page" aria-live="polite"></div>
			</section>
			<aside class="sidebar" aria-label="Room members">
				<h2 class="sidebar-heading">Members</h2>
				<ul id="roster" class="roster"></ul>
				<h2 id="bodycam-heading" class="sidebar-heading bodycam-heading" hidden>
					You
				</h2>
				<figure id="bodycam" class="bodycam" hidden>
					<canvas
						id="bodycam-canvas"
						tabindex="0"
						aria-label="Emotion wheel: drag the dot from the center toward an emotion; distance sets intensity"
					></canvas>
					<figcaption
						id="bodycam-status"
						class="bodycam-status"
						role="status"
					></figcaption>
				</figure>
				<label class="tweaks-toggle">
					<input
						id="modern-toggle"
						type="checkbox"
						checked
						aria-describedby="tweaks-hint"
					/>
					Modern tweaks
				</label>
				<p id="tweaks-hint" class="tweaks-hint">
					Smaller text fits more per balloon. Turn off for the original 1996
					layout; panels may break differently for other viewers.
				</p>
			</aside>
		</main>
		<form id="composer" class="composer">
			<select id="composer-mode" aria-label="Balloon type">
				<option value="1">Say</option>
				<option value="3">Think</option>
				<option value="2">Whisper</option>
				<option value="5">Action</option>
			</select>
			<input
				id="composer-text"
				maxlength="1000"
				required
				placeholder="Type your message"
				autocomplete="off"
				aria-label="Message"
			/>
			<button type="submit">Send</button>
		</form>
		<section id="join" class="join-overlay" aria-label="Connect to a room">
			<div class="dialog">
				<header class="dialog-titlebar">Connect</header>
				<form id="join-form" class="dialog-body">
					<label>
						Room
						<input
							id="join-room"
							name="room"
							required
							pattern="[\w\-]{1,64}"
							placeholder="lobby"
							autocomplete="off"
						/>
					</label>
					<label>
						Nickname
						<input
							id="join-name"
							name="name"
							required
							maxlength="24"
							placeholder="Your name"
							autocomplete="nickname"
						/>
					</label>
					<label>
						Character
						<select id="join-avatar" name="avatar"></select>
					</label>
					<div class="dialog-buttons">
						<button type="submit">Connect</button>
					</div>
				</form>
			</div>
		</section>
		<p id="status" class="status" role="status">Loading fonts and avatar art…</p>
		<script type="module" src="/src/browser/room.ts"></script>
	</body>
</html>
